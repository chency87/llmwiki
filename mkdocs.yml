site_name: LLMWiki
theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Architecture: architecture.md
  - Workflows: workflow.md
  - CLI Reference: cli.md
  - Deployment: deployment.md
  - Memory & State: memory.md
  - Quartz Visualization: quartz.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
